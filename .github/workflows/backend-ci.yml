name: Backend CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
      - 'docker-compose.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  # ============================================
  # STAGE 1: TESTLER VE KALİTE KONTROLÜ
  # ============================================
  test:
    name: 🧪 Unit & Integration Testleri
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: 📥 Kodu al (Checkout)
        uses: actions/checkout@v4

      - name: 🟢 Node.js ${{ matrix.node-version }} Kur
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: 📦 Bağımlılıkları yükle
        working-directory: ./backend
        run: npm ci

      - name: 🔍 Statik kod analizi (ESLint)
        working-directory: ./backend
        run: npm run lint --if-present
        continue-on-error: true

      - name: 🧪 Testleri çalıştır (Coverage ile)
        working-directory: ./backend
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: test_jwt_secret_key_for_ci_only
          MONGO_URI: mongodb://localhost:27017/test_db
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}

      - name: 📊 Coverage raporunu yükle (Codecov)
        uses: codecov/codecov-action@v4
        with:
          directory: ./backend/coverage
          flags: backend
          fail_ci_if_error: false
        continue-on-error: true

  # ============================================
  # STAGE 2: DOCKER IMAGE BUILD & PUSH
  # Sadece main branch + testler geçince çalışır
  # ============================================
  docker-build:
    name: 🐳 Docker Image Oluştur & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: 📥 Kodu al
        uses: actions/checkout@v4

      - name: 🐳 Docker Buildx kur
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Docker Hub'a giriş yap
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🏷️ Image metadata oluştur
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/smart-wardrobe-backend
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: 🏗️ Docker Image build et ve Docker Hub'a push et
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          dockerfile: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # STAGE 3: RENDER'A OTOMATİK DEPLOY (CD)
  # Docker image hazır olduktan sonra çalışır
  # ============================================
  deploy:
    name: 🚀 Render'a Deploy Et (CD)
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 🚀 Render Deploy Hook'u Tetikle
        run: |
          echo "🚀 Render deploy başlatılıyor..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
          
          if [ "$RESPONSE" -ge 200 ] && [ "$RESPONSE" -lt 300 ]; then
            echo "✅ Deploy tetiklendi! HTTP $RESPONSE"
          else
            echo "❌ Deploy tetiklenemedi! HTTP $RESPONSE"
            exit 1
          fi

      - name: ⏳ Render'ın deploy tamamlamasını bekle (60sn)
        run: sleep 60

      - name: 🔍 Canlı URL Sağlık Kontrolü
        run: |
          echo "🔍 Canlı URL kontrol ediliyor..."
          HEALTH_URL="https://${{ secrets.RENDER_SERVICE_NAME }}.onrender.com/api/health"
          
          for i in {1..5}; do
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" || echo "000")
            if [ "$RESPONSE" = "200" ]; then
              echo "✅ Uygulama canlıda! $HEALTH_URL"
              break
            fi
            echo "⏳ Deneme $i/5 - HTTP $RESPONSE - 20sn bekleniyor..."
            sleep 20
          done
          
          if [ "$RESPONSE" != "200" ]; then
            echo "⚠️ Health check başarısız, Render logs'larını kontrol et!"
            exit 1
          fi

      - name: ✅ Deploy Özeti
        run: |
          echo "================================"
          echo "✅ DEPLOY BAŞARIYLA TAMAMLANDI!"
          echo "================================"
          echo "🌐 Canlı URL: https://${{ secrets.RENDER_SERVICE_NAME }}.onrender.com"
          echo "📋 Commit: ${{ github.sha }}"
          echo "👤 Tetikleyen: ${{ github.actor }}"
          echo "================================"
