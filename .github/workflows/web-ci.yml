name: Web CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'web/**'
      - '.github/workflows/web-ci.yml'
      - 'docker-compose.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'web/**'
      - '.github/workflows/web-ci.yml'

jobs:
  # ============================================
  # STAGE 1: BUILD & LİNT KONTROLÜ
  # ============================================
  build:
    name: 🏗️ Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Kodu al (Checkout)
        uses: actions/checkout@v4

      - name: 🟢 Node.js 20 Kur
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: 📦 Bağımlılıkları yükle
        working-directory: ./web
        run: npm ci

      - name: 🔍 ESLint Kontrolü
        working-directory: ./web
        run: npm run lint
        continue-on-error: true

      - name: 🏗️ Next.js Build
        working-directory: ./web
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'https://smart-wardrobe-ai-2nwd.onrender.com/api' }}

  # ============================================
  # STAGE 2: DOCKER IMAGE BUILD & PUSH
  # Build başarılı olunca çalışır, sadece main'de push yapar
  # ============================================
  docker-build:
    name: 🐳 Docker Image Oluştur & Push
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: 📥 Kodu al
        uses: actions/checkout@v4

      - name: 🐳 Docker Buildx kur
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Docker Hub'a giriş yap
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🏷️ Image metadata oluştur
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/smart-wardrobe-web
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: 🏗️ Docker Image build et ve Docker Hub'a push et
        uses: docker/build-push-action@v5
        with:
          context: ./web
          push: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # STAGE 3: RENDER'A OTOMATİK DEPLOY (CD)
  # Docker image hazır olduktan sonra çalışır
  # ============================================
  deploy:
    name: 🚀 Render'a Deploy Et (CD)
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 🚀 Render Web Deploy Hook'u Tetikle
        run: |
          echo "🚀 Web deploy başlatılıyor..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.RENDER_WEB_DEPLOY_HOOK_URL }}")

          if [ "$RESPONSE" -ge 200 ] && [ "$RESPONSE" -lt 300 ]; then
            echo "✅ Deploy tetiklendi! HTTP $RESPONSE"
          else
            echo "❌ Deploy tetiklenemedi! HTTP $RESPONSE"
            exit 1
          fi

      - name: ⏳ Render'ın deploy tamamlamasını bekle (90sn)
        run: sleep 90

      - name: 🔍 Canlı URL Sağlık Kontrolü
        run: |
          echo "🔍 Web canlı URL kontrol ediliyor..."
          WEB_URL="https://${{ secrets.RENDER_WEB_SERVICE_NAME }}.onrender.com"

          for i in {1..5}; do
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "$WEB_URL" || echo "000")
            if [ "$RESPONSE" = "200" ]; then
              echo "✅ Web uygulaması canlıda! $WEB_URL"
              break
            fi
            echo "⏳ Deneme $i/5 - HTTP $RESPONSE - 20sn bekleniyor..."
            sleep 20
          done

      - name: ✅ Deploy Özeti
        run: |
          echo "================================"
          echo "✅ WEB DEPLOY TAMAMLANDI!"
          echo "================================"
          echo "🌐 Web URL: https://${{ secrets.RENDER_WEB_SERVICE_NAME }}.onrender.com"
          echo "📋 Commit: ${{ github.sha }}"
          echo "👤 Tetikleyen: ${{ github.actor }}"
          echo "================================"
