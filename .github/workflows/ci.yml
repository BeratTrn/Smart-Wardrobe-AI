name: Smart Wardrobe AI - CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # TESTLER VE KALİTE KONTROLÜ
  test:
    name: 🧪 Unit & Integration Testleri
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: 📥 Kodu al (Checkout)
        uses: actions/checkout@v4

      - name: 🟢 Node.js ${{ matrix.node-version }} Kur
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: 📦 Bağımlılıkları yükle
        working-directory: ./backend
        run: npm ci

      - name: 🔍 Statik kod analizi (ESLint)
        working-directory: ./backend
        run: npm run lint --if-present
        continue-on-error: true

      - name: 🧪 Testleri çalıştır (Coverage ile)
        working-directory: ./backend
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: test_jwt_secret_key_for_ci
          MONGO_URI: mongodb://localhost:27017/test_db
          # Gerçek API anahtarları CI'da GitHub Secrets'tan gelir
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}

      - name: 📊 Coverage raporunu yükle (Codecov)
        uses: codecov/codecov-action@v4
        with:
          directory: ./backend/coverage
          flags: backend
          fail_ci_if_error: false
        continue-on-error: true


  # DOCKER BUILD (Sadece main branch)
  docker-build:
    name: 🐳 Docker Image Oluştur
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Kodu al
        uses: actions/checkout@v4

      - name: 🐳 Docker Buildx kur
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Docker Hub'a giriş yap
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🏗️ Docker image oluştur ve push et
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/smart-wardrobe-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/smart-wardrobe-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


  # DEPLOY (Sadece main branch)
  deploy:
    name: 🚀 Render'a Deploy Et
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 🚀 Render Deploy Hook Tetikle
        run: |
          curl -s "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" | jq .
        continue-on-error: true

      - name: ✅ Deploy tamamlandı
        run: echo "✅ Smart Wardrobe AI backend başarıyla deploy edildi!"
